name: simulate-trades

on:
  schedule:
    - cron: "40 13 * * 1-5"  # 09:40 ET DST
    - cron: "40 14 * * 1-5"  # 09:40 ET EST
  workflow_dispatch:
    inputs:
      date:
        description: "Backfill a specific date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: simulate
  cancel-in-progress: false

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run simulator
        env:
          SIMULATE_DATE: ${{ github.event.inputs.date }}
        run: python simulate.py

      - name: Commit CSV
        run: |
          git config user.name  "scan-bot"
          git config user.email "scan-bot@users.noreply.github.com"
          git pull --rebase origin main
          git add data/*.csv || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "simulate: $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
