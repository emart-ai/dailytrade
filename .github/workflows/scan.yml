name: premarket-scan

on:
  schedule:
    # Times are UTC. ET = UTC-4 during DST (Mar–Nov), UTC-5 otherwise.
    # During DST: 09:00 ET = 13:00 UTC, 09:25 = 13:25, 09:30 = 13:30, 09:35 = 13:35
    # Two extra entries cover EST (winter): +1h
    - cron: "0 13 * * 1-5"
    - cron: "25 13 * * 1-5"
    - cron: "30 13 * * 1-5"
    - cron: "35 13 * * 1-5"
    - cron: "0 14 * * 1-5"
    - cron: "25 14 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "35 14 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run scanner
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scanner.py

      - name: Commit CSV
        run: |
          git config user.name  "scan-bot"
          git config user.email "scan-bot@users.noreply.github.com"
          git add data/*.csv || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "scan: $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
